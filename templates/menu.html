{% extends "layout.html" %}
{% block content %}

<h2>Menu</h2>

<div class="menu-container">
{% for item in items %}
<div class="menu-item">

{% if item.image %}
<img src="{{ url_for('static', filename='uploads/' + item.image) }}" class="menu-img">
{% endif %}

<h3>{{item.name}}</h3>
<p>{{item.description}}</p>
<p class="price">{{item.price}}.000 VNĐ</p>

</div>
{% endfor %}
</div>

{% endblock %}
