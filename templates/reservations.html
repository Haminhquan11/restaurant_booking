{% extends "layout.html" %}
{% block content %}

<h2>Đặt bàn (13:00 - 22:00)</h2>


<div class="reservation-wrapper">

    <form method="POST">

        <label>Tên:</label>
        <input name="name">

        <label>Email:</label>
        <input name="email"  pattern=".+@gmail\.com"
        title="Vui lòng nhập đúng địa chỉ Gmail (@gmail.com)"
        required
        placeholder="username@gmail.com">

        <label>Số điện thoại</label>
<input
    type="text"
    name="phone"
    pattern="[0-9]{10}"
    maxlength="10"
    inputmode="numeric"
    required
>

        <label>Số người:</label>
        <input type="number" name="guests">

        <label>Ngày:</label>
<!--        <input type="date" name="date">-->
<input type="date" name="date" min="{{today}}">
        <label>Chọn bàn:</label>
        <select name="table_number">
            {% for i in range(1,11) %}
            <option value="{{i}}">Bàn {{i}}</option>
            {% endfor %}
        </select>

        <label>Giờ:</label>
        <input type="time" name="time">

        <button>Đặt bàn</button>
    </form>


    <div class="reservation-image">
        <img src="{{ url_for('static', filename='restaurant-reservations') }}">
    </div>

</div>

{% endblock %}
